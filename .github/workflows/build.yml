name: Compilar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Compilar APK debug
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Renombrar APK
        run: cp app/build/outputs/apk/debug/app-debug.apk grabador-impulsys.apk

      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: grabador-impulsys-apk
          path: grabador-impulsys.apk

      - name: Publicar en Release (link directo)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Última versión
          files: grabador-impulsys.apk
